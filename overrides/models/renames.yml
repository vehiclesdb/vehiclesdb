                         # kept from MVP; revisit: Spacetourer is arguably its own MPV nameplate
  2CV6: null             # trim of 2CV; classic tail
Toyota:
  Prius Plus: Prius      # Prius+ (7-seat) folded per nameplate-granularity policy
  Prius Plug-In: Prius
Hyundai:
  Atos-Prime: Atos
Nissan:
  Leaf 40KWH: Leaf       # battery-size registrations
  Leaf 62KWH: Leaf
  QASHQAI+2: Qashqai     # 7-seat variant
Suzuki:
