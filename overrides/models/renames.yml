# Final per-make nameplate corrections, applied AFTER the pipeline's
# normalization. `null` drops the entry; a string renames/merges it into
# another nameplate. Keys are canonical make display names; sub-keys are the
# post-normalization nameplate as the pipeline produced it (that's why some
# look odd — they're what survives normalization, e.g. "Cee D").
#
# This is the "last word" file (PRD-2 §8.7 spirit): don't fight it, but every
# line must say WHY. Seeded from the RDW MVP (scripts/build.rb OVERRIDES,
# hand-verified against live RDW 2026-06); extended during multi-source
# reconciliation (source noted per line).

Mercedes-Benz:
  Evito: null            # eVito is the van kind (electric Vito), leaks via RDW car class
  "200": null            # bare engine-code registrations (W123/W124 era), not nameplates
  200 D: null
  300 D: null
  280 SE: null
Volkswagen:
  Buggy: null            # kit-car/beach-buggy registrations on Beetle base
  Kever: null            # Dutch for Beetle — classic-era rows; Beetle nameplate covers it
  Multivan: null         # van kind (T-series passenger)
  Kombi: null            # van kind
  Passat CC: Passat      # CC marketed as Passat CC then standalone; folded (dropdown UX)
  Touareg R: Touareg     # R is a trim
Opel:
  Karl / Viva: Karl      # RDW dual-market label
  Karl/viva: Karl
  Karl Rocks / Viva Rocks: Karl
