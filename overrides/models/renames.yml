# Final per-make nameplate corrections, applied AFTER the pipeline's
# normalization. `null` drops the entry; a string renames/merges it into
# another nameplate. Keys are canonical make display names; sub-keys are the
# post-normalization nameplate as the pipeline produced it (that's why some
# look odd — they're what survives normalization, e.g. "Cee D").
#
# This is the "last word" file (PRD-2 §8.7 spirit): don't fight it, but every
# line must say WHY. Seeded from the RDW MVP (scripts/build.rb OVERRIDES,
# hand-verified against live RDW 2026-06); extended during multi-source
# reconciliation (source noted per line).

Mercedes-Benz:
  Evito: null            # eVito is the van kind (electric Vito), leaks via RDW car class
  "200": null            # bare engine-code registrations (W123/W124 era), not nameplates
  200 D: null
  300 D: null
  280 SE: null
Volkswagen:
  Buggy: null            # kit-car/beach-buggy registrations on Beetle base
  Kever: null            # Dutch for Beetle — classic-era rows; Beetle nameplate covers it
  Multivan: null         # van kind (T-series passenger)
  Kombi: null            # van kind
  Passat CC: Passat      # CC marketed as Passat CC then standalone; folded (dropdown UX)
  Touareg R: Touareg     # R is a trim
Opel:
  Karl / Viva: Karl      # RDW dual-market label
  Karl/viva: Karl
  Karl Rocks / Viva Rocks: Karl
  Karl Rocks: Karl       # Rocks is a trim
  Crossland X: Crossland # X dropped in 2020 facelift; one nameplate
  Grandland X: Grandland
  Mokka X: Mokka
  Insignia Grand Sport: Insignia
  Astra Twin Top: Astra  # coupé-cabrio variant
  Astra-CC: Astra
  Astra-Caravan: Astra   # estate variant
Renault:
  Megane Scenic: Scenic  # first-gen Scenic was badged Megane Scenic
  Grand Scenic: Scenic   # LWB variant
Kia:
  Cee D: Ceed            # RDW writes "CEE D" / "CEE'D"; official spelling since 2018 is Ceed
  Cee'd: Ceed
Citroën:
  C4 Space: C4           # C4 Spacetourer → keyword rule handles body; name folds to C4? NO —
                         # kept from MVP; revisit: Spacetourer is arguably its own MPV nameplate
  2CV6: null             # trim of 2CV; classic tail
Toyota:
  Prius Plus: Prius      # Prius+ (7-seat) folded per nameplate-granularity policy
  Prius Plug-In: Prius
Hyundai:
  Atos-Prime: Atos
Nissan:
  Leaf 40KWH: Leaf       # battery-size registrations
  Leaf 62KWH: Leaf
  QASHQAI+2: Qashqai     # 7-seat variant
Suzuki:
  Wagon-R: Wagon R
Škoda:
  Enyaq 60: Enyaq        # battery-size registrations
  Enyaq 80: Enyaq
  Enyaq 85: Enyaq
  Elroq 50: Elroq
  Elroq 60: Elroq
  Elroq 85: Elroq
Volvo:
  240 Polar U9: null     # single-trim registration noise

Ford:
  Mustang Mach: Mustang Mach-E  # the -E stripper (for Corsa-E) eats Mach-E; restore the official name

Chrysler:
  Town&country LX: Town & Country       # fueleconomy.gov spells it without spaces + trim; official name has them
  Town&country Touring: Town & Country  # same, Touring trim

Tesla:
  "512": null   # data error — Tesla never made a "512" (likely a miscoded Ferrari/other); drop
