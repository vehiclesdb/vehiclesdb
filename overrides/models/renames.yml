Škoda:
  Enyaq 60: Enyaq        # battery-size registrations
  Enyaq 80: Enyaq
  Enyaq 85: Enyaq
  Elroq 50: Elroq
  Elroq 60: Elroq
  Elroq 85: Elroq
Volvo:
  240 Polar U9: null     # single-trim registration noise

Ford:
  Mustang Mach: Mustang Mach-E  # the -E stripper (for Corsa-E) eats Mach-E; restore the official name

Chrysler:
  Town&country LX: Town & Country       # fueleconomy.gov spells it without spaces + trim; official name has them
  Town&country Touring: Town & Country  # same, Touring trim

Tesla:
  "512": null   # data error — Tesla never made a "512" (likely a miscoded Ferrari/other); drop

# =============================================================================
# ES-brand audit (2026-07-12, multi-agent find→verify pass). NOTE these blocks
# are make-scoped but kind-blind — kind hazards are tripwired in spotchecks.yml.
