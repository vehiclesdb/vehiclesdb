# Display-casing curation for nameplates and makes.
#
# stylings: whole-string replacements checked FIRST (uppercase key → exact
#           display form). For names whose official casing defies word rules.
# acronyms: tokens kept fully uppercase by the caser (everything else gets
#           capitalized per word/segment; digits freeze a token as-is).
#
# Seeded from the RDW MVP (scripts/build.rb STYLINGS/ACRONYMS); extend as new
# sources surface official casings (source per line where non-obvious).

stylings:
  UP: Up
  UP!: Up                # VW up! — bang dropped for id/dropdown sanity, alias keeps it findable
  E-TRON: e-tron         # Audi's official lowercase
  BZ4X: bZ4X             # Toyota's official camel-case
  ZOE: Zoe
  EOS: Eos
  IQ: iQ                 # Toyota iQ
  IX: iX                 # BMW iX
  EQA: EQA
  EQB: EQB
  EQC: EQC
  EQE: EQE
  EQS: EQS
  EQV: EQV
  RCZ: RCZ
  ID.3: ID.3             # VW ID family keeps dots + caps
  ID.4: ID.4
  ID.5: ID.5
  ID.7: ID.7
  XCEED: XCeed           # Kia official casing
  PROCEED: ProCeed
  E-C3: ë-C3             # Citroën ë prefix (source strings arrive as E-C3)
  E-C4: ë-C4
  MX-5: MX-5
  CX-3: CX-3
  CX-30: CX-30
  CX-5: CX-5
  CX-60: CX-60
  CX-80: CX-80

