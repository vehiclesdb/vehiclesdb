# Make SEARCH ALIASES — genuine alternate names a marque is known by:
# nicknames, initialisms, native-script renderings. These are PUBLISHED as
# the make's open `aliases` field (search, autofill, i18n, data viz) and also
# resolve at ingest and in SDK lookups.
#
# This file is deliberately separate from aliases.yml: that one holds ingest
# CLEANUP mappings (coachbuilder combos, entity strings, registry typos) that
# must never surface as "alternate names". Everything here is a documented,
# real-world way of naming the marque — with a comment saying which world.
#
# Shape: alias string (exactly as published) → canonical make name.

"VW": Volkswagen            # universal initialism
"Vdub": Volkswagen          # EN nickname
"Chevy": Chevrolet          # universal nickname
"Beemer": BMW               # EN nickname
"Bimmer": BMW               # EN nickname (purists' spelling)
"Merc": Mercedes-Benz       # EN nickname
"Benz": Mercedes-Benz       # universal short form
"MB": Mercedes-Benz         # initialism
"Alfa": Alfa Romeo          # universal short form
"Lambo": Lamborghini        # universal nickname
"HD": Harley-Davidson       # initialism
"Harley": Harley-Davidson   # universal short form
"Guzzi": Moto Guzzi         # universal short form
"ВАЗ": Lada                 # Cyrillic factory name (АвтоВАЗ) — how CIS listings write it
"Лада": Lada                # Cyrillic spelling
"Жигули": Lada              # RU: the classic Zhiguli family name
"ЗАЗ": ZAZ                  # Cyrillic
"ГАЗ": GAZ                  # Cyrillic
"УАЗ": UAZ                  # Cyrillic
"Богдан": Bogdan            # Cyrillic (UA bus maker)
"ИЖ": IZh                   # Cyrillic (RU spelling)
"Fuso": Mitsubishi Fuso     # the badge name
"比亚迪": BYD               # zh-Hans (Bǐyàdí)
"吉利": Geely               # zh-Hans
