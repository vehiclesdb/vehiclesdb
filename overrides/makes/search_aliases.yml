# Make SEARCH ALIASES — genuine alternate names a marque is known by:
# nicknames, initialisms, native-script renderings. These are PUBLISHED as
# the make's open `aliases` field (search, autofill, i18n, data viz) and also
# resolve at ingest and in SDK lookups.
#
# This file is deliberately separate from aliases.yml: that one holds ingest
# CLEANUP mappings (coachbuilder combos, entity strings, registry typos) that
# must never surface as "alternate names". Everything here is a documented,
# real-world way of naming the marque — with a comment saying which world.
#
# Shape: alias string (exactly as published) → canonical make name.

"VW": Volkswagen            # universal initialism
"Vdub": Volkswagen          # EN nickname
"Chevy": Chevrolet          # universal nickname
"Beemer": BMW               # EN nickname
"Bimmer": BMW               # EN nickname (purists' spelling)
"Merc": Mercedes-Benz       # EN nickname
"Benz": Mercedes-Benz       # universal short form
"MB": Mercedes-Benz         # initialism
"Alfa": Alfa Romeo          # universal short form
"Lambo": Lamborghini        # universal nickname
"HD": Harley-Davidson       # initialism
"Harley": Harley-Davidson   # universal short form
"Guzzi": Moto Guzzi         # universal short form
"ВАЗ": Lada                 # Cyrillic factory name (АвтоВАЗ) — how CIS listings write it
"Лада": Lada                # Cyrillic spelling
"Жигули": Lada              # RU: the classic Zhiguli family name
"ЗАЗ": ZAZ                  # Cyrillic
"ГАЗ": GAZ                  # Cyrillic
"УАЗ": UAZ                  # Cyrillic
"Богдан": Bogdan            # Cyrillic (UA bus maker)
"ИЖ": IZh                   # Cyrillic (RU spelling)
"Fuso": Mitsubishi Fuso     # the badge name
"比亚迪": BYD               # zh-Hans (Bǐyàdí)
"吉利": Geely               # zh-Hans
"长城": Great Wall          # zh-Hans
"奇瑞": Chery               # zh-Hans
"红旗": Hongqi              # zh-Hans
"零跑": Leapmotor           # zh-Hans
"小鹏": XPeng               # zh-Hans
"蔚来": Nio                 # zh-Hans
"丰田": Toyota              # zh-Hans rendering
"トヨタ": Toyota            # ja katakana
"ホンダ": Honda             # ja katakana
"ヤマハ": Yamaha            # ja katakana
"スズキ": Suzuki            # ja katakana
"日産": Nissan              # ja kanji
"三菱": Mitsubishi          # ja kanji
"현대": Hyundai             # ko hangul
"기아": Kia                 # ko hangul

# --- ES-brand audit (2026-07-12) ---------------------------------------------
"Montesa Honda": Montesa    # corporate name since the 1982 Honda agreement (Montesa Honda, S.A. — 88% Honda by 1986); bikes and dealer/registry listings co-badged (https://montesa.com/en/history/)
"TRRS": TRS                 # the marque badges its bikes and web catalog TRRS (trsmotorcycles.com); UK registry strings say "TRRS ONE"
"GASGAS": Gas Gas           # official one-word rendering since the Pierer era (gasgas.com); canonical display "Gas Gas" is a repo decision
"Scutum": Silence           # former brand / legal-entity name (Scutum Logistic S.L.) — how pre-rebrand listings name the marque (https://www.wikidata.org/wiki/Q22059031)
"MH": Motorhispania              # the marque's own initialism — bikes badged MH (MH Furia, MH RYZ); brand site mhmotorcycles.com titles itself "MH Motorhispania"
"Motor Hispania": Motorhispania  # documented two-word trade form (wemoto.com "Motor Hispania Furia, RYZ 50") — also guards future ingest of a spaced raw string
"Stark Future": Stark       # full company name (https://starkfuture.com/) — press and listings use it alongside the short badge
