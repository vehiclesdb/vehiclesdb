# Makes to DROP for the given kind (they belong to another kind, or are
# coachbuilders/converters that pollute passenger-car data).
#
# Shape: kind → list of raw UPPERCASE make strings (as sources emit them),
# each with a reason. Dropping here only affects that kind's build — e.g.
# IVECO is dropped from `car` but is a legitimate `van`/`truck` make.
#
# Provenance: seeded from the RDW MVP curation (scripts/build.rb DROP_MAKES,
# validated against live RDW pulls 2026-06); grows per-source as reconciliation
# surfaces leakage. RDW "Personenauto" famously includes camper/kombi
# conversions registered as cars — see Dossier §4.2.

car:
  - IVECO           # truck/van maker; leaks into car data via camper conversions
  - MAN             # truck maker; camper conversions
  - DAF             # truck maker; classic-car tail + conversions
  - SCANIA          # truck maker
  - VOLVO TRUCKS    # RDW splits from VOLVO; trucks kind picks it up
  - ADRIA MOBIL     # motorhome coachbuilder
  - KNAUS           # caravan/motorhome builder
  - WEINSBERG       # motorhome builder
  - HYMER           # motorhome builder
  - DETHLEFFS       # motorhome builder
  - HOBBY           # caravan builder
