  - MOBILVETTA      # motorhome brand (SEA group)
  - MCLOUIS         # motorhome brand (SEA group)
  - XGO             # motorhome brand (Rimor)
  - RANDGER         # motorhome brand (FI registrations)
  - FIAT/HYMER      # RDW/FI compound base-vehicle+builder string
  - REMETZ          # NL hearse/limo coachbuilder
  - ALLIED VEHICLES LTD  # UK wheelchair-accessible converter
  - BENIMAR         # motorhome builder (ES — *51 code rows too)
  - ROLLER-TEAM     # motorhome builder (IT)
  - ROLLER TEAM     # spelling variant of the above
  - BUNKERVAN       # ES camper converter
  - GIOTTILINE      # motorhome builder (IT)
  - ELNAGH          # motorhome builder (SEA group)
  - RIMOR           # motorhome builder (IT)
  - CHALLENGER      # motorhome brand (Trigano) — NOT the Dodge Challenger (model, not make)
  - ITINEO          # motorhome brand (Rapido group)
  - SUNLIGHT        # motorhome brand (Erwin Hymer)
  - LAIKA           # motorhome builder (Hymer group)
  - MALIBU          # motorhome brand (Carthago) — NOT the Chevrolet Malibu (model)
