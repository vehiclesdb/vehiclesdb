  - LMC             # motorhome builder (Erwin Hymer)
  - NIESMANN+BISCHOFF  # motorhome builder (Hymer group)
  - FRANKIA         # motorhome builder (Pilote group)
  - RAPIDO          # motorhome builder (FR) — second listing guards the FI spelling

