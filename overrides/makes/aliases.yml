# --- CIS marques (Cyrillic raw strings from the UA register, ua_mvs) ---------
# Volumes measured 2026-07-05 in reestrtz2026 (H1). Without these aliases the
# Cyrillic folds to an empty slug and the normalizer drops the row.
"ВАЗ": Lada              # 32,201 rows — VAZ = the Lada factory (АвтоВАЗ); merges with Latin LADA rows
"ЗАЗ": ZAZ               # 8,985 — Zaporizhzhia Automobile Plant (Tavria, Slavuta, Sens)
"ЗАЗ-DAEWOO": ZAZ        # 2,943 — the ZAZ-Daewoo era (Lanos/Sens built in Zaporizhzhia)
"ГАЗ": GAZ               # 4,869 — Gorky Automobile Plant (Volga, Gazelle)
"УАЗ": UAZ               # 888 — Ulyanovsk (469, Hunter, Patriot)
"АЗЛК": Moskvich         # 526 — АЗЛК = the Moskvich factory (2140/2141)
"МОСКВИЧ": Moskvich      # spelling variant of the above
"ДНІПРО": Dnepr          # 851 — Dnepr heavy motorcycles (KMZ, Kyiv)
"КМЗ": Dnepr             # 316 — Kyiv Motorcycle Plant, maker of Dnepr; registered under the factory acronym
"ИЖ": IZh                # 668 — Izhevsk (Planeta/Jupiter motorcycles, 2126 cars; Russian spelling)
"ІЖ": IZh                # Ukrainian spelling of the above
"БОГДАН": Bogdan         # 622 — Ukrainian bus maker (A091/A092 city buses)
"БАЗ": BAZ               # 376 — Boryspil bus plant (Bogdan group chassis)
"МАЗ": MAZ               # 847 — Minsk Automobile Plant (buses reach the bus kind; freight is skipped)
"КАМАЗ": KamAZ           # 1,355 — Kama trucks (mostly freight-skipped; buses exist)
"КРАЗ": KrAZ             # 415 — Kremenchuk trucks
"ЗИЛ": ZIL               # 1,370 — Moscow plant (freight-skipped; the rare limousines are cars)
"ЛУАЗ": LuAZ             # LuAZ 969 amphibious 4x4s — iconic UA marque, low volume but CIS-only

# --- compound/entity make strings (measured 2026-07-05) ----------------------
"OPEL VAUXHALL": Opel    # combined-marque registration strings (Vivaro vans); base marque wins
"OPEL/JEGGER": Opel      # Jegger coachbuilt Movano conversions — base vehicle is the make
