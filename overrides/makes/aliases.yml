# Make aliases — raw source strings (UPPERCASE) → canonical display name.
#
# This is curation DATA, not code: every line is reviewable, PR-able, and linted
# (scripts/lint_overrides.rb). Anything not listed gets smart-title-cased by the
# pipeline; add a line here whenever a source spells a make in a way the default
# casing gets wrong, or when two raw spellings must merge into one make.
#
# Sources of raw spellings seen so far: NL RDW `merk` (https://opendata.rdw.nl/resource/m9d7-ebf2.json),
# UK DfT VEH0120 `Make` (https://www.gov.uk/government/statistical-data-sets/vehicle-licensing-statistics-data-files),
# ES DGT MARCA_ITV (https://www.dgt.es/menusecundario/dgt-en-cifras/matraba-listados/matriculaciones-automoviles-mensual.html),
# FI Traficom merkkiSelvakielinen, LU SNCA LIBMRQ, BE FPS Make, MY JPJ maker,
# UA MVS BRAND, AR DNRPA marca_descripcion.
#
# Rule of thumb: keys are raw UPPERCASE strings exactly as sources emit them;
# values are our canonical display names. One canonical name per real-world make.

VOLKSWAGEN: Volkswagen
VW: Volkswagen                       # UK/BE/UA shorthand; BE even emits "VOLKSWAGEN, VW" (see models/drop_patterns note)
VOLKSWAGEN, VW: Volkswagen           # BE FPS Mobility combined label (measured 2026-07-05, raw-findings/regional)
MERCEDES-BENZ: Mercedes-Benz
MERCEDES BENZ: Mercedes-Benz
