# Body-type curation, three layers (checked in this order by the pipeline):
#   1. overrides  — "Make|Model" → type. Highest priority, hand-checked. For
#                   collision-prone names (GT, Manta, Tigra…) and exceptions.
#   2. keywords   — regex on the nameplate. Productive multi-word families.
#   3. sets       — exact-match category sets. Multi-word names spelled in full.
# After these, make-aware family rules (code: pipeline/lib/normalizer.rb) and
# only THEN the registry's own signal — because registry body data is coarse:
# RDW `inrichting`'s "stationwagen" is a catch-all that lumps estates, SUVs,
# crossovers and even Golf hatchbacks (verified live 2026-06; only 1,756
# vehicles in the whole NL fleet use the honest `terreinvoertuig` tag).
# Canonical vocabulary: hatchback sedan wagon suv mpv coupe convertible
# roadster pickup van (PRD-2 §9.2, unchanged).

overrides:
  Alfa Romeo|GT: coupe
  Opel|GT: roadster
  Opel|Manta: coupe
  Opel|Tigra: coupe
  Opel|Cascada: convertible
  Chevrolet|Corvette: coupe
  Ford|Capri: coupe
  Ford|Mustang: coupe            # the coupé; Mustang Mach-E is a separate nameplate (spotcheck)
  Peugeot|RCZ: coupe
  Peugeot|306: hatchback
  Peugeot|406: sedan
  Toyota|Celica: coupe
  Toyota|Prius: hatchback
  Toyota|Corolla: hatchback      # EU-dominant body; sedan exists but hatch is the dropdown expectation
  Volkswagen|Scirocco: coupe
  Volkswagen|Eos: convertible
  Volkswagen|Beetle: hatchback
  Volkswagen|California: van
  Fiat|Barchetta: roadster
  Fiat|500X: suv
  MG|B: roadster                 # the classic MGB
  MG|Mgf: roadster
  MG|MG5: wagon                  # the EV estate sold in EU
  Triumph|Spitfire 1500 Tc: convertible
  Honda|Civic 3: hatchback
  Honda|Civic 5: hatchback
  Lancia|Delta: hatchback
  Hyundai|ix35: suv
  Hyundai|ix20: mpv
  Hyundai|Ioniq: hatchback
  Hyundai|Ioniq 5: suv
  Hyundai|Ioniq 6: sedan
  Chrysler|Pt Cruiser: wagon
  Chrysler|Grand Voyager: mpv
  Citroën|C5 X: wagon
  Citroën|C4 Cactus: suv
  Smart|Smart: hatchback
  Smart|Fortwo: hatchback
  Smart|Forfour: hatchback
  Daihatsu|Materia: mpv
  Nissan|Note: hatchback
  Nissan|Leaf: hatchback
  # --- ES-brand audit (2026-07-12) ---
  SEAT|600: sedan                # classic rear-engined 2-door saloon (1957-73); the make-unscoped "600" set entry (meant for the Fiat 600e revival) was poisoning it
  SEAT|Exeo: sedan               # Audi A4 B7-based saloon (Exeo ST = the wagon secondary); no hatchback Exeo existed
  EBRO|S700: suv                 # mid-size SUV (Chery Tiggo 7 platform, built ex-Nissan Barcelona) — DGT-only rows were default-typed hatchback
  EBRO|S800: suv                 # 7-seat SUV (Chery Tiggo 8 platform), same revival family
  EBRO|S400: suv                 # compact SUV (Chery Tiggo 4 Pro base) — key is the post-rename nameplate (S400 Hev → S400)

keywords:                        # [type, ruby-regex] — checked before the sets
  - [suv, '\b(Aircross|Crossback|Cross)\b']   # *Cross / Aircross / Crossback crossovers
  - [mpv, '\b(Picasso|Spacetourer)\b']
  - [mpv, 'Max\b']                            # C-Max / S-Max / B-Max / Grand C-Max

